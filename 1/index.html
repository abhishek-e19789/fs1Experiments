<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Student Registration</title>
    <link rel="stylesheet" href="studentRegistration.css">
    <link rel="stylesheet" href="header.css">
    <script src="studentRegistration.js"></script>
</head>
<body>
    <header>
        <nav>
            <h2>Experiment 1</h2>
            <ul>
                <li><a href="/index.html" target="_blank" >Experiment 1.1</a></li>
                <li><a href="/banking.html" target="_blank">Experiment 1.2</a></li>
            </ul>
        </nav>
    </header>
    <form class="form">
        <h1>Student Registration Form</h1>
        <label for="name">Name:</label>
        <input type="text" name="name" required placeholder="Jhon Doe" class="formInput">
        <label for="age">Age</label>
        <input type="number" name="age" required min="5" max="35" class="formInput">
        <label for="email">Email:</label>
        <input type="email" name="email" class="formInput">
        <div class="button">
        <input type="button" value="Register" style="
        color:white;
        background-color: black;
        border-radius: 5px;
        height: 37px;
        width:40%;" onclick="submittedData()">
        </div>
    </form>
</body>
</html>
