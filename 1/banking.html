<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="banking.css">
    <link rel="stylesheet" href="header.css">
    <script src="banking.js"></script>
    <title>Banking</title>
</head>
<body>
    <header>
        <nav>
            <h2>Experiment 1</h2>
            <ul>
                <li><a href="/index.html" target="_blank" >Experiment 1.1</a></li>
                <li><a href="/banking.html" target="_blank">Experiment 1.2</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <form id="bankForm">
            <h1 id="heading">Balance $1000</h1>
            <label for="amount">Amount:</label>
            <input type="number" required min="100" id="field">
            <div class="button">
                <button type="button" class="inbutton" style="background:blue" onclick="deposite()">Deposit</button>
                <button type="button" class="inbutton" style="background:red" onclick="withdraw()">Withdraw</button>
            </div>
            <p class="error" style="visibility: hidden;">Invalid amount!</p>
        </form>
    </div>
</body>
</html>
